name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tooling
        run: |
          python -m pip install -U pip build pytest ruff tomli

      - name: Format integrity
        run: |
          python scripts/validate_format_integrity.py

      - name: Doc version consistency
        run: |
          python scripts/validate_doc_version.py

      - name: Compile check
        run: |
          python -m compileall src tests scripts

      - name: Build package
        run: |
          python -m build

      - name: Verify release artifacts
        run: |
          python scripts/verify_release_artifacts.py

      - name: Install built wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl

      - name: Run tests
        run: |
          pytest

      - name: Run C golden vector consistency test
        run: make -C c/golden_vectors test

      - name: Run Rust golden vector consistency test
        run: cargo test --manifest-path rust/golden_vectors/Cargo.toml

      - name: Lint
        run: |
          ruff check src tests scripts
