name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install numpy pytest ruff build
      - name: Install package
        run: pip install -e .
      - name: Lint
        run: ruff check src/cnbe32/
      - name: Unit tests (no DB required)
        run: pytest tests/test_cnbe32_full.py -m "not integration" -v
      - name: Integration tests (with DB)
        run: pytest tests/test_cnbe32_full.py -v
      - name: Build check
        run: python -m build
